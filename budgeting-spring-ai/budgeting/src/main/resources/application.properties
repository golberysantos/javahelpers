spring.application.name=budgeting
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Autenticação e Configuração Base da OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.model=gpt-4o-mini

# Configuração de Output Estruturado (JSON Schema) do Chat
# Nota: Tipo alterado para JSON_SCHEMA para respeitar o schema preenchido abaixo
spring.ai.openai.chat.response-format.type=JSON_SCHEMA
spring.ai.openai.chat.response-format.name=MySchemaName
spring.ai.openai.chat.response-format.schema={"type":"object","properties":{"steps":{"type":"array","items":{"type":"object","properties":{"explanation":{"type":"string"},"output":{"type":"string"}},"required":["explanation","output"],"additionalProperties":false}},"final_answer":{"type":"string"}},"required":["steps","final_answer"],"additionalProperties":false}
spring.ai.openai.chat.response-format.strict=true

# Configuração de Transcrição de Áudio (Whisper)
spring.ai.model.audio.transcription=openai
spring.ai.openai.audio.transcription.options.model=whisper-1
spring.ai.openai.audio.transcription.options.language=pt
spring.ai.openai.audio.transcription.options.temperature=0
spring.ai.openai.audio.transcription.options.response-format=text
# Acentuação corrigida em UTF-8
spring.ai.openai.audio.transcription.options.prompt=Áudio em português brasileiro. \
  Áudio contém descrição de gastos financeiros. \
  As frases geralmente contêm: \
   - um valor em reais (número + "reais"); \
   - uma ação (gastei, paguei, comprei); \
   - um local ou estabelecimento (mercado, farmácia, restaurante, loja, etc.).

# Configuração de Texto para Voz (Speech/TTS)
spring.ai.model.audio.speech=openai
spring.ai.openai.audio.speech.options.model=gpt-4o-mini-tts
spring.ai.openai.audio.speech.options.voice=nova
spring.ai.openai.audio.speech.options.speed=1.2
spring.ai.openai.audio.speech.options.response-format=mp3

# Logs detalhados para depuração do Spring AI
logging.level.org.springframework.ai=DEBUG