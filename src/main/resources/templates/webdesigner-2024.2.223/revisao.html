<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revisão</title>
    <style>
        header{
            background-color: rgb(41, 41, 244);
            border: solid 2px;
            border-radius: 5px;
        }
        .alinhamento-opcoes{
            display: flex;            
            justify-content: right;
        }
        a{
            padding: 15px;
        }
        main{
            border: solid 1px;
            border-radius: 5px;
        }
        footer{
            border: solid 1px;
            border-radius: 5px;
            text-align: center;
        }
        .alinhamento2{
            display: flex;
            flex-direction: row;        
        }
        .article-largura{
            width: 60%;
            background-color: bisque;
        }
        .aside-largura{
            width: 40%;
            background-color: brown;
        }
        .padding-bloco-1e2{
            padding: 10px;
        }
        
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="alinhamento-opcoes">
                <a href="#">Opção 1</a>
                <a href="#">Opção 2</a>
                <a href="#">Opção 3</a>
            </div>           
        </nav>
    </header>

    <main>
        <div class="alinhamento2">
            <article class="article-largura padding-bloco-1e2">bloco 1</article>
            <aside class="aside-largura padding-bloco-1e2">bloco 2</aside>
        </div>
        
    </main>

    <footer>By Golbery</footer>

</body>
</html>
