<!DOCTYPE html>
<html lang="pt-br">

<head>

    <title>Login-Golbery</title>
    <link rel="stylesheet" href="static/css/login-base.css">
</head>

<body>
    <header>
        <nav></nav>
    </header>
    <main>
        <form action="" class="login personalizaCaixa">
            <h1>Login</h1>
            <div>
                <label for="usuario"> Usuário </label>
                <input type="text" name="usuario" id="usuario">

            <div>

                <input type="password" name="senha" id="senha">
            </div>
            <div>
                <button type="submit" class="personalizaBotao">Entrar</button>
            </div>
            <p>
                Esqueceu a senha?
                <a href="">
                    Clique aqui.
                </a>
            </p>
        </form>
    </main>
    <footer>
        <p class="p">By Golbery</p>
    </footer>
</body>

</html>
