<body>
  <header>
    <nav class="navbar navbar-expand-lg headerBgColor">
      <div class="container-fluid">
        <a class="navbar-brand" href="../../home/home.html">Gvrer</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Sobre</a>
            </li>
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                aria-expanded="false">
                Dropdown
              </a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Action</a></li>
                <li><a class="dropdown-item" href="#">Another action</a></li>

            <li class="nav-item">
              <a class="nav-link" href="../../usuario/login.html">Entrar</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>
  <main>
    <div class="container al">
      <form action="" class="mt-3 mb-3 col-md-6 login border border-4 rounded">
        <div class="card p-3">
          <div>
            <h2 class="mt-2 mb-4">Seja bem vindo ao Gvrer</h2>
          </div>
          <div class="mb-3">
            <label for="usuario" class="form-label">Usuário (E-mail ou celular)</label>
            <input type="text" class="form-control validar" name="usuario" id="usuario" required />
          </div>
          <div class="mb-3">
            <label for="senha" class="form-label">Senha</label>
            <input type="password" class="form-control" name="senha" id="senha" required />
            <p class="fas fa-eye eye-icon" id="togglePassword"></p>
            <div class="mt-2">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" value="" id="termosDeUso" />
                <p>
                  Li e estou de acordo com os
                  <a href="https://modeloinicial.com.br/conteudo/termos-de-uso-e-privacidade" target="_blank"
                    class="text-decoration-none">Termos de Uso</a>
                </p>
              </div>
            </div>
          </div>
          <div class="mb-3">
            <button onclick="enviar()" type="button" id="button" class="btn btn-dark col-12">
              Criar conta
            </button>
          </div>
        </div>
      </form>
    </div>

  <script src="../../static/js/redirecionarParaOutraPagina.js"></script>
  <script src="../golbery/usuario.js"></script>

  <script>
    function enviar() {
      if (validar()) {
        abrirEmOutraAba("../../home/home.html");
      } else {
        Swal.fire({
          title: "Opps!",
          text: "preencha os espaços em branco",
          icon: "dunger",
          confirmButtonColor: "#FF385C",
        });
      }
    }
  </script>
