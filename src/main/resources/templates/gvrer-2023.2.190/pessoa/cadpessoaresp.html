      <nav class="navbar navbar-expand-lg headerBgColor">
        <div class="container-fluid">
            <a class="navbar-brand" href="../home/home.html">Gvrer</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Sobre</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            :: Mais

                        <ul class="dropdown-menu">
                            <li class="nav-item">
                                <a class="nav-link" href="../usuario/login.html">Entrar</a>
                            </li>
                            <li><a class="dropdown-item" href="../usuario/usuario.html">Cadastrar-se</a></li>

    </header>
    <main>
      <div class="container al">
        <form
          action=""
          class="mt-3 mb-3 col-md-6 login border border-4 rounded"
        >
          <div class="card p-3">
            
            <div><h1 class="mt-2 mb-4 ">Seja bem vindo ao Gvrer</h1></div>
              <div class="mb-3">
              <label for="usuario" class="form-label"
                >Nome</label
              >
              <input
                type="text"
                class="form-control"
                name="usuario"
                id="usuario"
              />
            </div>
            <div class="mb-3">
              <label for="cpf" class="form-label">CPF</label>
              <input
                type="tel"
                class="form-control"
                name="cpf"
                id="cpf"
                maxlength="14"
                placeholder="XXX.XXX.XXX-XX"
              />
            </div>
            <div class="mb-3">
              <label for="telefone" class="form-label">Número de celular</label>
              <input
                type="tel"
                class="form-control"
                name="telefone"
                id="telefone"
                maxlength="15"
                placeholder="XXX.XXX.XXX-XX"
              />
            </div>
            <div class="mb-3">
              <div>

                <label for="sexo" class="form-label">Sexo</label>
              </div>
              <div class="form-check form-check-inline">
                <input  class="form-check-input" type="radio" id="inlineCheckbox1" name="genero" value="masculino">
                <label class="form-check-label" for="inlineCheckbox1">Masculino</label>
            </div>
            <div class="form-check form-check-inline">
              <input  class="form-check-input" type="radio" id="inlineCheckbox2" name="genero" value="feminino">
              <label class="form-check-label" for="inlineCheckbox1">Feminino</label>
          </div>
          
            <div class="mt-3">
              <button type="button" class="btn col-12 mb-4 mt-4">Entrar</button>
            </div>
            
          </div>
        </form>
      </div>
    </main>
    </main>

    <footer>
      <div class="text-center footerBgColor p-3">
        <p class="p">&copy; Gvrer | By Renan</p>
