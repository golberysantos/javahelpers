    <main>
      <div class="container al">
        <form
          action=""
          class="mt-3 mb-3 col-md-6 login border border-4 rounded"
        >
          <div class="card p-3">
            <div class="d-flex justify-content-center">
              <h1 class="corDoTitulo">Gvrer</h1>
            </div>

            <div class="mb-3">
              <label for="usuario" class="form-label"
                >Nome</label
              >
              <input
                type="text"
                class="form-control"
                name="usuario"
                id="usuario"
              />
            </div>
            <div class="mb-3">
              <label for="cpf" class="form-label">CPF</label>
              <input
                type="tel"
                class="form-control"
                name="cpf"
                id="cpf"
                maxlength="14"
                placeholder="XXX.XXX.XXX-XX"
              />
            </div>
            <div class="mb-3">
              <label for="telefone" class="form-label">Número de celular</label>
              <input
                type="tel"
                class="form-control"
                name="telefone"
                id="telefone"
                maxlength="15"
                placeholder="XXX.XXX.XXX-XX"
              />
            </div>
            <div class="mb-3">
              <label for="sexo" class="form-label">Sexo</label>
              <div class="form-check form-check-inline">
                <input  class="form-check-input" type="checkbox" id="inlineCheckbox1" value="option1">
                <label class="form-check-label" for="inlineCheckbox1">Masculino</label>
            </div>
            <div class="form-check form-check-inline">
              <input  class="form-check-input" type="checkbox" id="inlineCheckbox1" value="option1">
              <label class="form-check-label" for="inlineCheckbox1">Feminino</label>
          </div>
          <div class="form-check form-check-inline">
            <input  class="form-check-input" type="checkbox" id="inlineCheckbox1" value="option1">
            <label class="form-check-label" for="inlineCheckbox1">Outros</label>
        </div>
            <div class="mb-3">
              <button type="button" class="btn btn-dark">Entrar</button>
            </div>
            
          </div>

    </main>
