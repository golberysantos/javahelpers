<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        h1 {
            text-transform: uppercase;
            color: #414BB2;
            background-color: blueviolet;
        }

        div {
            text-align: center;
        }

        form {
            border: solid 3px;
            margin-left: 15%;
            margin-right: 15%;
            border-color: rgb(91, 91, 108);
            border-radius: 15px;
        }

        .buttonEntrar {
            background-color: #414BB2;
            color: white;
            border: solid 2px;
            border-color: black;
            border-radius: 15px;
            padding: 5px 45px 5px 45px;
            margin: 45px 0 45px 0;
        }

        header {
            padding: 25px;
            background-color: black;
            font-size: 20pt;
            text-align: end;
        }

        footer {
            padding: 5px;
            background-color: black;
            font-size: 20pt;
            text-align: center;
        }

        .pRodape {
            color: white;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <a href="index.html">Home</a>
        </nav>
    </header>
    <main>
        <div>
            <form action="">
                <h1>login</h1><br>
                <img src="static/img/logo.png" alt="Imagem logo" width="20%"><br>

                <label for="user">Usuário (E-mail ou CPF):</label><br>
                <input type="text" name="user" id="user"><br>

                <label for="senha">Senha:</label><br>
                <input type="password" name="senha" id="senha"><br>
                <button class="buttonEntrar" type="button" onclick="validar()">Entrar</button><br>
                <a href="#">Cadastre-se</a>
                <p>Você também pode entrar com:</p>
                <button type="button">Google</button><br>
                <button type="button">Facebook</button><br>
            </form>
        </div>
    </main>
    <footer>
        <p class="pRodape">Desenvolvido por Golbery</p>
    </footer>
    <script>
        const usuarioBd = "gabriel@gmail";
        const senhaBd = "123";
        var usuario;
        var senha;
        function validar() {
            usuario = document.getElementById('user').value;
            senha = document.getElementById('senha').value;
            console.log("Valor do campo usuário: " + usuario);
            console.log("Valor do campo senha: " + senha);
            verificar();
        }

        function verificar() {
            if (usuarioBd == usuario && senhaBd == senha) {
                console.log("Sucesso!!");
                window.location.href = "principal.html";
            } else {
                alert("Erro!! Usuário ou senha incorreto.");
                console.log("Erro!! Usuário ou senha incorreto.");
            }
        }
    </script>
</body>

</html>
