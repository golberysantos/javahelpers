    <main>

        <div class="container">
            <div class="d-flex justify-content-center row">
                <div class="form">
                    <h1>Cadastro itinerário</h1>

                    <form class="row g-3 ">

                        <div class="col-12">
                            <label for="inputAddress" class="form-label">Tipo de transporte</label>
                            <select class="form-select" aria-label="Default select example">
                                <option selected>Escolha o tipo de transporte</option>
                                <option value="1">carro</option>
                                <option value="2"> van</option>
                                <option value="3">barco</option>
                            </select>
                        </div>

                        <div class="col-12">
                            <label for="inputAddress" class="form-label">Tipo de acomodação</label>
                            <select class="form-select" aria-label="Default select example">
                                <option selected>Escolha o tipo de acomodação</option>
                                <option value="1">Hotéis</option>
                                <option value="2">Pousadas e Hostels</option>
                                <option value="3">Albergues e Casas de Campo</option>
                                <option value="4">Resorts e Villages</option>
                                <option value="5">Aluguel de Casas ou Apartamentos</option>
                                <option value="6">Cruzeiros</option>
                                <option value="7">Camping</option>

                            </select>
                        </div>
                        <div class="col-12">
                            <label for="inputAddress" class="form-label">Valor</label>
                            <input type="text" class="form-control" id="inputAddress" placeholder="Nome">
                        </div>
                        <div class="col-12">
                            <label for="inputAddress" class="form-label">Observações Adicionais</label>
                            <input type="text" class="form-control" id="inputAddress" placeholder="Ingredientes">
                        </div>
                        <div class="col-12">
                            <label for="inputAddress2" class="form-label">Destino</label>
                            <input type="text" class="form-control" id="inputAddress2"
                                placeholder="Apartment, studio, or floor">
                        </div>
                        <div class="col-12">
                            <label for="inputCity" class="form-label">Seguro de Viagem</label>
                            <input type="text" class="form-control" id="inputCity">
                        </div>
                        <div class="col-12">
                            <label for="inputCity" class="form-label">Eventos ou festividades</label>
                            <input type="text" class="form-control" id="inputCity">
                        </div>
                        <div class="col-12">
                            <label for="inputCity" class="form-label">Horário de partida</label>
                            <input type="time" class="form-control" id="inputCity">
                        </div>

                        <div class="col-12">
                            <label for="inputZip" class="form-label">Horário de chegada</label>
                            <input type="time" class="form-control" id="inputZip">
                        </div>

                        <div class="col-12">
                            <label for="inputZip" class="form-label">Horário de Acomodações</label>
                            <input type="time" class="form-control" id="inputZip">
                        </div>

                        <div class="col-12">
                            <label for="inputZip" class="form-label">Horário de Atividades (programação) </label>
                            <input type="time" class="form-control" id="inputZip">
                        </div>

                        <div class="col-12">
                            <label for="inputZip" class="form-label">Contatos de Emergência</label>
                            <input type="text" class="form-control" id="inputZip">
                        </div>

                        <div class="col-12">
                            <label for="inputZip" class="form-label">O transporte acesso à rampa?</label>
                            <input type="text" class="form-control" id="inputZip">
                        </div>

                        <div class="col-12">
                            <label for="inputZip" class="form-label">A hospedagem tem acesso à rampa?</label>
                            <input type="text" class="form-control" id="inputZip">
                        </div>

                        <div class="col-2 pb-2">
                            <button id="button" type="button" class="btn btn-primary">Salva</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </main>

</body>

</html>
