<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="description" content="Palpite Certo - Cadastro de Usuário">
    <meta name="keywords" content="palpite, certo, cadastro, usuário">
    <meta name="author" content="Josiane">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../static/css/usuario.css" rel="stylesheet">
    <title>Palpite Certo</title>
</head>

<body>

    <header>
        <nav>

        </nav>
    </header>

    <main>      
         
        
     
          <div class="form-container">
            <h2 class="text-center mb-4">Cadastro de Usuário</h2>
            <form>
              <div class="mb-3">
                <label for="email" class="form-label">E-mail</label>
                <input type="email" class="form-control" id="email" placeholder="Digite seu e-mail" required>
              </div>
        
              <div class="mb-3">
                <label for="senha" class="form-label">Senha</label>
                <input type="password" class="form-control" id="senha" placeholder="Digite sua senha" required>
              </div>
        
              <div class="mb-3">
                <label for="confirmarSenha" class="form-label">Confirmar Senha</label>
                <input type="password" class="form-control" id="confirmarSenha" placeholder="Confirme sua senha" required>
              </div>
        
              <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" value="" id="termos" required>
                <label class="form-check-label" for="termos">
                  Li e estou de acordo com os <a href="#" style="color: #A67A44;">termos</a>
                </label>
              </div>
        
              <div class="d-grid">
                <button type="submit" class="btn btn-custom">Cadastrar</button>
              </div>
            </form>
          </div>
       
        
    </main>
</main>

<footer>
    &copy; By Josiane
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
