<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap/bootstrap5.0.2.min.css">
    <title>Palpite Certo</title>
</head>

<body>

    <header>
        <nav>

        </nav>
    </header>

    <main class="d-flex justify-content-center">
        <!-- Formulário para cadastro de usuário. -->
        <div class="row row-cols-lg-auto g-3 align-items-center col-6">
            <form class="ms-5 me-5 mt-5 mb-5 top-0 end-0" >
                <div class="shadow p-3 mb-5 bg-body-tertiary rounded">
                    <div class="mb-3">
                        <label for="exampleInputEmail1" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                        <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
                    </div>
                    <div class="mb-3">
                        <label for="exampleInputPassword1" class="form-label">Password</label>
                        <input type="password" class="form-control" id="exampleInputPassword1">
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="exampleCheck1">
                        <label class="form-check-label" for="exampleCheck1">Check me out</label>
                    </div>
                    <button type="submit" class="btn btn-dark col-12">Submit</button>
                </div>

            </form>
        </div>
    </main>

    <footer>
        &copy; By Golbery
    </footer>
    <script src="js/bootstrap/poppercore2.9.2.min.js"></script>
    <script src="js/bootstrap/bootstrap5.0.2.min.js"></script>

</body>

</html>
